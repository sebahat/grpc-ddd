# SERVER
server.port=9092

# ======================
# DATABASE
# ======================
spring.datasource.url=jdbc:postgresql://order-postgres:5432/ordersdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


# ======================
# JPA (IMPORTANT FIX)
# ======================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======================
# SQL INIT
# ======================
spring.sql.init.mode=always 
spring.sql.init.schema-locations=classpath:schema.sql

# gRPC CLIENT
grpc.client.inventory-service.address=static://inventory-service:9090
grpc.client.inventory-service.negotiation-type=plaintext

# RESILIENCE4J RETRY
resilience4j.retry.instances.inventoryRetry.max-attempts=3
resilience4j.retry.instances.inventoryRetry.wait-duration=500ms
resilience4j.retry.instances.inventoryRetry.retry-exceptions=io.grpc.StatusRuntimeException,java.util.concurrent.TimeoutException

# METRICS
#grpc.metrics.enabled=false

# ======================
# ACTUATOR
# ======================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

